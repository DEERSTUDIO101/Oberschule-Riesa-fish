[build]
  publish = "cms.sachsen.schule"

[[redirects]]
  from = "/"
  to = "/asz-riesa/start.html"
  status = 302

[[redirects]]
  from = "/start"
  to = "/asz-riesa/start.html"
  status = 301

[[redirects]]
  from = "/bilder"
  to = "/asz-riesa/bilder.html"
  status = 301

[[redirects]]
  from = "/kontakt"
  to = "/asz-riesa/kontakt.html"
  status = 301

[[redirects]]
  from = "/schulprofil"
  to = "/asz-riesa/schulprofil.html"
  status = 301

[[redirects]]
  from = "/termine"
  to = "/asz-riesa/termine.html"
  status = 301

[[redirects]]
  from = "/mitwirkung"
  to = "/asz-riesa/mitwirkung.html"
  status = 301

[[redirects]]
  from = "/foerderverein"
  to = "/asz-riesa/foerderverein.html"
  status = 301

[[redirects]]
  from = "/schulinfos"
  to = "/asz-riesa/schulinfos.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/fileadmin/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"